      // exercise 2e - 2j

      function ProductDetails(props)
      {
        const { price, product, discountPrice, imageSrc } = props;

        return(
          <div>
            <img src={imageSrc} width="200" />

            <p>{product}</p>

            {discountPrice ? (
              <>
                <p><del>Price: ${price}</del></p>
                <p>Discount price: ${discountPrice}</p>
              </>
            ) : (
              <p>Price: ${price}</p>
            )}

            <button>Add to Cart </button>
          </div>
        );
      }

      function App()
      {
        return(
          <>
            <ProductDetails 
              price="10.90"
              product="Cotton Socks"
              discountPrice="5.45"
              imageSrc="cotton-socks.png"
            />
            
            <ProductDetails 
              price="6.00"
              product="Tennis Balls"
              imageSrc="tennis-balls.png"
            />

            <ProductDetails 
              price="7.99"
              product="Plain T-shirt"
              imageSrc="plain-t-shirt.png"
            />
          </>
        );
      }

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
