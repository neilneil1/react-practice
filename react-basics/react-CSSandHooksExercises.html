      function App()
      {
        const [count, setCount] = React.useState(0);
        const autoClickRef = React.useRef();

        function increaseCount()
        {
          setCount(count + 1);
        }

        function resetCount()
        {
          setCount(0);
        }

        function autoClick()
        {
          setInterval(() => {
            const buttonElem = autoClickRef.current;
            if(buttonElem)
            {
              buttonElem.click();
            }
          }, 1000);
        }

        return(
          <div className="counter-container">
            <button 
              className="counter-button" 
              ref={autoClickRef} 
              onClick={increaseCount}>
              Clicked {count} {count === 1 ? 'time' : 'times'}</button>

            <button 
              className="counter-button" 
              onClick={resetCount}>
              Reset</button>

            <button 
              className="counter-button" 
              onClick={autoClick}>
              Auto Click</button>
          </div>
        );
      }

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
